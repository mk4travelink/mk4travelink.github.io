---
layout: default
---

<aside class="sidebar">
  <header>
    <div class="about">
      <div class="cover-author-image">
        <a href="{{site.baseurl}}/"><img src="{{site.baseurl}}/assets/img/{% if site.author-img %}{{site.author-img}}{% endif %}" alt="{{site.author}}"></a>
      </div>
      <div class="author-name">{{site.author}}</div>
      <p>{{site.about-author}}</p>
    </div>
  </header> <!-- End Header -->
  <footer>
    <section class="contact">
      <h3 class="contact-title">Follow Us</h3>
     <ul>
        <li>
          <a href="https://medium.com/@mk4promo" target="_blank">
            <i class="fa fa-medium" aria-hidden="true"></i> Medium
          </a>
        </li>
        <li>
          <a href="https://substack.com/@mk4promo" target="_blank">
            <i class="fa fa-newspaper-o" aria-hidden="true"></i> Substack
          </a>
        </li>
        <li>
          <a href="https://www.tumblr.com/mk4promo" target="_blank">
            <i class="fa fa-tumblr" aria-hidden="true"></i> Tumblr
          </a>
        </li>
        <li>
          <a href="https://www.quora.com/profile/MK4PROMO" target="_blank">
            <i class="fa fa-quora" aria-hidden="true"></i> Quora
          </a>
        </li>
        <li>
          <a href="mailto:mk4promo@gmail.com">
            <i class="fa fa-envelope-o" aria-hidden="true"></i> Email
          </a>
        </li>
      </ul>
    </section> <!-- End Section Contact -->
    <div class="copyright">
      <p>{{site.time | date: '%Y'}} &copy; {{site.author}}</p>
    </div>
  </footer> <!-- End Footer -->
</aside> <!-- End Sidebar -->
<div class="content-box clearfix">
  {{ content }}
</div>
